<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mural de Fotos</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
}

/* BANNER */

.banner{
height:300px;
background:url("banner.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
text-shadow:0 0 20px black;
}

/* GALERIA */

.galeria{
column-count:4;
column-gap:15px;
padding:30px;
}

.item{
break-inside:avoid;
margin-bottom:15px;
}

.item img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.item img:hover{
transform:scale(1.03);
}

/* VISOR DE FOTO */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* RESPONSIVE */

@media(max-width:1000px){
.galeria{
column-count:3;
}
}

@media(max-width:700px){
.galeria{
column-count:2;
}
}

@media(max-width:500px){
.galeria{
column-count:1;
}
}

</style>

</head>

<body>

<div class="banner">
Mi mural
</div>

<div class="galeria">

<div class="item">
<img src="fotos/foto1.jpg" onclick="abrir(this)">
</div>

<div class="item">
<img src="fotos/foto2.jpg" onclick="abrir(this)">
</div>

<div class="item">
<img src="fotos/foto3.jpg" onclick="abrir(this)">
</div>

<div class="item">
<img src="fotos/foto4.jpg" onclick="abrir(this)">
</div>

<div class="item">
<img src="fotos/foto5.jpg" onclick="abrir(this)">
</div>

</div>

<div class="lightbox" id="lightbox" onclick="cerrar()">
<img id="imagenGrande">
</div>

<script>

function abrir(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("imagenGrande").src=img.src;
}

function cerrar(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
